<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <title>Agregar Película</title>
</head>
<body>
    <h1>Agregar Película</h1>
    <form id="formulario">
        <label>Título: <input type="text" id="titulo" required></label><br>
        <label>Género: <input type="text" id="genero" required></label><br>
        <label>Duración: <input type="number" id="duracion" required></label><br>
        <label>Año: <input type="number" id="anio" required></label><br>
        <button type="submit">Guardar</button>
    </form>
    <script src="crear.js"></script>
</body>
</html>
